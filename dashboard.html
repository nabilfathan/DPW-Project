<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #b39359; --dark-bg: #0a0a0a; --card-bg: #141414; --border: rgba(179, 147, 89, 0.2); }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark-bg); color: #ffffff; }
        h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }
        .glass-card { background: var(--card-bg); border: 1px solid var(--border); }
        .input-luxury { background: transparent; border-bottom: 1px solid var(--border); color: #fff; padding: 8px 0; width: 100%; font-size: 13px; transition: 0.3s; }
        .input-luxury:focus { border-bottom-color: var(--gold); outline: none; }
        .btn-premium { border: 1px solid var(--gold); color: var(--gold); transition: 0.4s; letter-spacing: 0.1em; text-transform: uppercase; font-size: 10px; padding: 12px 24px; }
        .btn-premium:hover { background: var(--gold); color: #000; }
        label {font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: #71717a; display: block; margin-bottom: 0.25rem;}
        .section-title { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
        .section-title div { flex: 1; height: 1px; background: var(--border); }
    </style>
   <script>
    // Cek status login SEBELUM halaman dimuat
    if (sessionStorage.getItem('isLoggedIn') !== 'true') {
        window.location.replace("login.html");
    }

    function logout() {
        sessionStorage.removeItem('isLoggedIn'); 
        window.location.replace("login.html");
    }
</script>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-black border-r border-zinc-900 hidden lg:flex flex-col p-8">
        <h1 class="text-2xl font-serif italic text-center mb-10">Invitation</h1>
        <nav class="space-y-6 text-[11px] uppercase tracking-widest">
            <a href="#" class="text-amber-600 block">Dashboard</a>
            <a href="#mempelai" class="text-zinc-500 hover:text-white block">Mempelai</a>
            <a href="#acara" class="text-zinc-500 hover:text-white block">Jadwal & Lokasi</a>
            <a href="#galeri" class="text-zinc-500 hover:text-white block">Media</a>
            <a href="#tamu" class="text-zinc-500 hover:text-white block">Daftar Tamu</a>
        </nav>
    </aside>

    <main class="flex-1 h-screen overflow-y-auto p-10 md:p-16">
     <header class="flex justify-between items-end mb-16 border-b border-zinc-900 pb-8">
    <div>
        <h2 class="text-4xl font-serif italic mb-2 text-white">Management Suite</h2>
        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.2em]">Wedding Invitation • Admin Panel</p>
    </div>
    
    <div class="flex gap-4">
        <a href="index.html" target="_blank" class="btn-premium px-6 py-2 flex items-center hover:bg-zinc-900 transition">
            <i class="far fa-eye mr-2 text-[10px]"></i> View Live Site
        </a>
        
        <button onclick="logout()" class="text-[10px] uppercase tracking-widest text-zinc-600 hover:text-red-500 transition border border-zinc-800 px-6 py-2">
            <i class="fas fa-sign-out-alt mr-2"></i> Logout
        </button>
    </div>
</header>

        <section id="mempelai" class="mb-20">
            <div class="section-title"><h3 class="text-xl font-serif italic">Mempelai</h3><div></div></div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="glass-card p-8 space-y-6">
                    <p class="text-amber-600 text-[10px] uppercase font-bold mb-4 italic">Pihak Pria</p>
                    <div><label>Nama Lengkap</label><input type="text" class="input-luxury" value="Nabil"></div>
                    <div><label>Nama Ayah</label><input type="text" class="input-luxury" value="Fulan"></div>
                    <div><label>Nama Ibu</label><input type="text" class="input-luxury" value="Fulanah"></div>
                </div>
                <div class="glass-card p-8 space-y-6">
                    <p class="text-amber-600 text-[10px] uppercase font-bold mb-4 italic">Pihak Wanita</p>
                    <div><label>Nama Lengkap</label><input type="text" class="input-luxury" value="Titik"></div>
                    <div><label>Nama Ayah</label><input type="text" class="input-luxury" value="Fulan"></div>
                    <div><label>Nama Ibu</label><input type="text" class="input-luxury" value="Fulanah"></div>
                </div>
            </div>
        </section>

        <section id="acara" class="mb-20">
            <div class="section-title"><h3 class="text-xl font-serif italic">Acara & Lokasi</h3><div></div></div>
            <div class="glass-card p-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                    <div><label>Tanggal Akad</label><input type="date" class="input-luxury" value="2024-07-20"></div>
                    <div><label>Waktu Resepsi</label><input type="text" class="input-luxury" value="10.00 WIB - Selesai"></div>
                    <div><label>Countdown ISO</label><input type="text" class="input-luxury" value="2024-07-20T08:00:00"></div>
                </div>
                <div class="space-y-6">
                    <div><label>Nama Gedung</label><input type="text" class="input-luxury" value="Gedung Serba Guna FT UNRI"></div>
                    <div><label>Alamat Lengkap</label><input type="text" class="input-luxury" value="Kampus Binawidya, Panam, Pekanbaru"></div>
                    <div><label>Link Google Maps</label><input type="text" class="input-luxury text-amber-600" value="https://goo.gl/maps/..."></div>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-10 mb-20">
            <section id="galeri">
                <div class="section-title"><h3 class="text-xl font-serif italic">Gallery & Music</h3><div></div></div>
                <div class="glass-card p-8">
                    <label class="mb-4">Background Music (URL/File)</label>
                    <input type="text" class="input-luxury mb-8" value="romantic_piano.mp3">
                    
                    <label>Photos (Max 6)</label>
                    <div class="grid grid-cols-4 gap-2 mt-4">
                        <div class="aspect-square bg-zinc-900 border border-zinc-800 flex items-center justify-center relative group">
                            <span class="text-[8px] text-zinc-600 group-hover:hidden">IMG_1</span>
                            <button class="hidden group-hover:block text-red-500 text-xs"><i class="fas fa-times"></i></button>
                        </div>
                        <label class="aspect-square border border-dashed border-zinc-700 flex items-center justify-center cursor-pointer hover:border-gold">
                            <i class="fas fa-plus text-zinc-700"></i>
                            <input type="file" class="hidden">
                        </label>
                    </div>
                </div>
            </section>

            <section id="tamu">
                <div class="section-title"><h3 class="text-xl font-serif italic">RSVP List</h3><div></div></div>
                <div class="glass-card overflow-hidden">
                    <table class="w-full text-[11px]">
                        <thead class="bg-zinc-900/50 text-zinc-500 uppercase tracking-tighter">
                            <tr>
                                <th class="p-4 text-left font-normal">Nama</th>
                                <th class="p-4 text-center font-normal">Status</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-zinc-900">
                            <tr>
                                <td class="p-4">Ahmad Subarjo</td>
                                <td class="p-4 text-center"><span class="text-amber-600">HADIR</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>

        <div class="sticky bottom-10 flex justify-end">
            <button class="btn-premium bg-amber-900/10 backdrop-blur-md shadow-2xl">Simpan Perubahan</button>
        </div>
       
<div id="copyToast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-amber-600 text-black px-6 py-3 rounded-full text-xs font-bold tracking-widest opacity-0 transition-all duration-500 pointer-events-none uppercase">
    JSON Copied! Paste to GitHub.
</div>

<script>
async function copyJSON() {
    // Ambil data dari semua input secara dinamis
    // Sesuaikan selector dengan ID atau urutan input kamu
    const inputs = document.querySelectorAll('.input-luxury');
    
    const updatedData = {
        "mempelai": {
            "pria": { "nama": inputs[0].value, "ayah": inputs[1].value, "ibu": inputs[2].value, "foto": "pria.jpg" },
            "wanita": { "nama": inputs[3].value, "ayah": inputs[4].value, "ibu": inputs[5].value, "foto": "wanita.jpg" }
        },
        "acara": {
            "akad": { "tanggal": inputs[6].value, "jam": "08.00 - 10.00 WIB" },
            "resepsi": { "tanggal": inputs[6].value, "jam": inputs[7].value },
            "countdown": inputs[8].value
        },
        "lokasi": {
            "nama": inputs[9].value,
            "alamat": inputs[10].value,
            "maps_link": inputs[11].value
        }
        // Tambahkan field lain jika perlu
    };

    // Ubah jadi String JSON yang rapi
    const jsonString = JSON.stringify(updatedData, null, 2);

    // Copy ke Clipboard
    try {
        await navigator.clipboard.writeText(jsonString);
        
        // Tampilkan Notifikasi
        const toast = document.getElementById('copyToast');
        toast.style.opacity = "1";
        setTimeout(() => { toast.style.opacity = "0"; }, 3000);
        
        // Buka Tab GitHub Langsung (Opsional: ganti URL dengan repo kamu)
        // window.open('https://github.com/USER/REPO/edit/main/data.json', '_blank');
        
    } catch (err) {
        alert('Gagal copy: ', err);
    }
}

// Fungsi untuk Load Data Awal (dari file data.json yang ada)
window.onload = async () => {
    const res = await fetch('data.json');
    const data = await res.json();
    const inputs = document.querySelectorAll('.input-luxury');
    
    // Mapping otomatis (sesuaikan urutan input)
    inputs[0].value = data.mempelai.pria.nama;
    inputs[1].value = data.mempelai.pria.ayah;
    inputs[2].value = data.mempelai.pria.ibu;
    inputs[3].value = data.mempelai.wanita.nama;
    inputs[4].value = data.mempelai.wanita.ayah;
    inputs[5].value = data.mempelai.wanita.ibu;
    inputs[6].value = data.acara.akad.tanggal;
    inputs[7].value = data.acara.resepsi.jam;
    inputs[8].value = data.acara.countdown;
    inputs[9].value = data.lokasi.nama;
    inputs[10].value = data.lokasi.alamat;
    inputs[11].value = data.lokasi.maps_link;
};
</script>
    </main>
</body>
</html>
